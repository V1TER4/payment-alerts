services:
  postgres:
    image: postgres:16-alpine
    container_name: payment-alerts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payment}
      POSTGRES_DB: ${POSTGRES_DB:-payment_alerts}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-payment} -d ${POSTGRES_DB:-payment_alerts}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: payment-alerts-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      API_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-payment}:${POSTGRES_PASSWORD:-payment}@postgres:5432/${POSTGRES_DB:-payment_alerts}?schema=public
    ports:
      - '3000:3000'

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: payment-alerts-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: /api
    ports:
      - '5173:5173'

volumes:
  postgres_data:
